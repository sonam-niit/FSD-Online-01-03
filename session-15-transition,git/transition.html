<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trasition</title>
    <style>
        div{
            height: 100px;
            width: 200px;
            background-color: blue;
            transition: all 0.5s linear 1s;
            /* all: transition property */
            /* 0.5s: trasition duration */
            /* linear trasition function ease, ease-in */
            /* 1s: transition delay */
        }
        div:hover{
            width: 400px;
            background-color: chocolate;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
