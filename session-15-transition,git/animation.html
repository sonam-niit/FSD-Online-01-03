<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;

            animation: moveBox 2s;
        }
        /* Define Animation */
        @keyframes moveBox {
            from {
                transform: translateX(0);
            }
            to{
                transform: translateX(1000px);
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
