<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 300px;
            margin-top: 10px;
            background-color: darkgoldenrod;
        }
        .box{
            position: absolute;
            top: 40px;
            right: 400px;
            background-color: darkmagenta;
        }
        .test{
            position: absolute;
            bottom: 40px;
            left: 400px;
            background-color: darkmagenta;
        }

    </style>
</head>
<body>
    <div></div>
    <div></div>
    <div class="box"></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div class="test"></div>
    <div></div>
    
</body>
</html>
