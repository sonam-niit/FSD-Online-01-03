<!DOCTYPE html>
<html lang="en">
<head>
    <title>Class Selector</title>
    <style>
        /* . indicating class selector */
        /* name you can give anything same name use in tags 
        like class="one" */
        .one{
            color: red;
            background-color: yellow;
        }
        .two{
            color: blue;
            background-color: burlywood;
        }
    </style>
</head>
<body>
    <h1 class="one">First Heading</h1>
    <h1 class="two">Second Heading</h1>
    <h1 class="one">Third Heading</h1>
    <h1 class="two">Forth Heading</h1>
</body>
</html>
