<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="list">
        <li>1-One</li>
        <li>2-Two</li>
        <li>3-Three</li>
        <li>4-Four</li>
        <li>5-Five</li>
    </ul>
    <input type="text" placeholder="Entyer Some Item" id="txt"/>
    <button id="btn">Add Item</button>
    <script>
        //this listener is working for existing elemenst
        const list= document.querySelectorAll("li");
        list.forEach(li=>li.addEventListener('click',()=>{
            console.log(li.innerText);
        }))

        //for new added (dynamic elements delegation not happening)
        document.getElementById("btn").addEventListener('click',()=>{
            const input=document.getElementById("txt").value;
            const newLi= document.createElement("li");
            newLi.innerText=input;
            document.getElementById("list").appendChild(newLi);   
        })
    </script>
</body>
</html>
