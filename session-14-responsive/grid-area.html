<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar content"
                "footer footer";

            grid-template-columns: 1fr 2fr;
            gap: 10px;
            /* dynamic height */
        }

        div {
            color: white;
            text-align: center;
        }

        .header {
            grid-area: header;
            background-color: red;
        }

        .sidebar {
            grid-area: sidebar;
            background-color: green;
        }

        .content {
            grid-area: content;
            background-color: blue;
        }

        .footer {
            grid-area: footer;
            background-color: purple;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Sonam Soni</h1>
            <p>Test paragraph</p>
        </div>
        <div class="sidebar">this is my SideBar</div>
        <div class="content">
            <!-- p*20>lorem20 -->
        </div>
        <div class="footer">
            <h3>&copy; Pwskills.com </h3>
        </div>
    </div>
</body>

</html>
