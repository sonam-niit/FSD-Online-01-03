<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        div{
            height: 50px;
            width: 200px;
            margin-top: 10px;
            background-color: chartreuse;
        }
        .solid{
            border: 2px solid black;
        }
        .dashed{
            border: 2px dashed black;
        }
        .dotted{
            border: 2px dotted black;
        }
        .double{
            border: 6px double black;
        }

    </style>
</head>
<body>
    <div class="solid"></div>
    <div class="dashed"></div>
    <div class="dotted"></div>
    <div class="double"></div>
</body>
</html>
