<!DOCTYPE html>
<html lang="en">
<head>
    <title>Link</title>
    <style>
        /* LVHA - seq */
        a:link{
            color: black;
        }
        a:visited{
            color: green;
        }
        a:hover{
            background-color: yellow;
        }
        a:active{
            color: hotpink;
        }
    </style>
</head>
<body>
    <a href="http://www.google.com">Google</a>
    <a href="#">My New link</a>
</body>
</html>
