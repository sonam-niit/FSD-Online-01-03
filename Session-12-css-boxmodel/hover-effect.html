<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hover Effect</title>
    <style>
        button{
            background-color: brown;
            color: white;
            height: 50px;
            width: 100px;
            font-size: 18px;
        }
        button:hover{
            background-color: blue;
            width: 150px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <button>Click Me</button>
</body>
</html>
